<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BestellApp</title>
		<script src="scripts/db.js" defer></script>
		<script src="scripts/templateFunctions.js" defer></script>
		<script src="scripts/scripts.js" defer></script>

		<link rel="stylesheet" href="assets/stylesheets/style.css" />
		<link rel="stylesheet" href="assets/stylesheets/variables.css" />
		<link rel="stylesheet" href="assets/stylesheets/fonts.css" />
		<!-- FAVICON -->
	</head>
	<body>
		<header>BestellApp LOGO HERE</header>
		<main>
			<section class="hero">
				<div class="burger-logo-container">
					<img class="burger-logo" src="/assets/media/Burger_logo.png" />
				</div>
			</section>
			<div class="title-container">
				<h1>Burger<span class="h1-secondary-color-class">House</span></h1>
				<div class="ratings">
					<img src="./assets/media/black-star.png" class="black-star" /> <b>4,1</b> (317)
				</div>
				<h3>The best of Burgers, Pizza, and Greens, all in one great place</h3>
			</div>
			<div class="category-bar">
				<img src="./assets/media/burger.png" class="category-bar-icon" />
				<h3 class="category-bar-title">Burger & Sandwiches</h3>
			</div>
			<section class="food-section" id="burger-section"></section>
			<div class="category-bar">
				<img src="./assets/media/pizza.png" class="category-bar-icon" />
				<h3 class="category-bar-title">Pizza (30 cm)</h3>
			</div>
			<section class="food-section" id="pizza-section"></section>
			<div class="category-bar">
				<img src="./assets/media/salad.png" class="category-bar-icon" />
				<h3 class="category-bar-title">Salad</h3>
			</div>
			<section class="food-section" id="salad-section"></section>
			<div id="basket">
				<h3 class="basket-title">Your Basket</h3>
				<div id="basket-item-container"></div>
				<div id="basket-price-section">
					<div class="item-bottom-container">
						<p>Subtotal</p>
						<p id="subtotal">$0</p>
					</div>
					<div class="item-bottom-container">
						<p>Delivery fee</p>
						<p>$4,99</p>
					</div>
					<hr />
					<div class="item-bottom-container">
						<p>Total</p>
						<p id="total">$0</p>
					</div>
					<button id="buy-now-button">Buy now</button>
				</div>
			</div>
		</main>
		<footer>
			<p>copyright 2025 BurgerHouse</p>
			<p>Imprint</p>
			<p>Cookie Preferences</p>
		</footer>
	</body>
</html>
